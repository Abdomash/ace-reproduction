name: CI

on:
  push:
    branches: [main, add_ci]

  pull_request:
    branches: [main, add_ci]

  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - uses: pre-commit/action@v3.0.1
